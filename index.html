<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almanapp · Triboro</title>
  <link rel="stylesheet" href="feed.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>

  <header class="masthead">
    <div class="masthead-top">
      <span class="masthead-meta-l" id="mast-date">VOL. LXXIII · Bulletin No. 1</span>
      <span class="masthead-meta-c" id="mast-day"></span>
      <span class="masthead-meta-r" id="mast-smog">SMOG 847 PPM</span>
    </div>
    <a href="#/" class="masthead-title">ALMANAPP</a>
    <div class="masthead-tagline">All the building's news, posted by the building's people</div>
  </header>

  <nav class="subnav">
    <div class="subnav-links">
      <a href="#/" data-route="feed" class="active">Feed</a>
      <a href="#/people" data-route="people">People</a>
      <a href="#/events" data-route="events">Events</a>
      <a href="#/about" data-route="about">About Triboro</a>
    </div>
    <button id="auth-chip" class="auth-chip" type="button"><span class="chip-name">Sign in</span></button>
  </nav>

  <main id="root"></main>

  <footer>
    <div>Triboro · Year 73 · Population approx. 6,000</div>
    <div class="muted">All posts in-world fiction. No residents were stuck in real elevators.</div>
    <div class="muted"><a href="#" id="reset-view" class="reset-link">Restart Triboro from Day 1</a></div>
  </footer>

  <!-- On GitHub Pages, set this to the Worker URL printed by `wrangler deploy`,
       e.g. https://triboro-chat.<account>.workers.dev. Leaving it unset (or
       commented out) makes feed.js call same-origin, which is what local dev
       wants when running python3 server.py. -->
  <script>window.TRIBORO_BACKEND = "https://triboro-chat.billotoole.workers.dev";</script>

  <script src="feed.js"></script>
</body>
</html>
